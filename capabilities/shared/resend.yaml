naftiko: "1.0.0-alpha1"

info:
  label: "Resend API"
  description: >-
    Resend is a developer-first email API for sending transactional and marketing
    emails. Provides endpoints for sending emails, domain management, API key
    management, audience/contact management, and broadcast campaigns.
  tags:
    - Email
    - Transactional Email
    - Marketing Email
    - Developer Tools
    - Domains
    - Audiences
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RESEND_API_KEY: RESEND_API_KEY

capability:
  consumes:
    - type: http
      namespace: resend
      baseUri: https://api.resend.com
      description: "Resend email API for developers"
      authentication:
        type: bearer
        token: "{{RESEND_API_KEY}}"
      resources:
        - name: emails
          path: /emails
          description: "Email sending and management"
          operations:
            - name: send-email
              method: POST
              description: "Send an email"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  from: "{{tools.from}}"
                  to: "{{tools.to}}"
                  subject: "{{tools.subject}}"
                  html: "{{tools.html}}"
                  text: "{{tools.text}}"
            - name: get-email
              method: GET
              description: "Retrieve a single email by ID"
              inputParameters:
                - name: email_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the email"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-email
              method: PATCH
              description: "Update a scheduled email"
              inputParameters:
                - name: email_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the email"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  scheduled_at: "{{tools.scheduled_at}}"
            - name: cancel-email
              method: POST
              description: "Cancel the schedule of an email"
              inputParameters:
                - name: email_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the email"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-batch-emails
              method: POST
              description: "Trigger up to 100 batch emails at once"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  emails: "{{tools.emails}}"

        - name: domains
          path: /domains
          description: "Email domain management"
          operations:
            - name: create-domain
              method: POST
              description: "Create a new domain"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  region: "{{tools.region}}"
            - name: list-domains
              method: GET
              description: "Retrieve a list of domains"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-domain
              method: GET
              description: "Retrieve a single domain"
              inputParameters:
                - name: domain_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the domain"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-domain
              method: PATCH
              description: "Update an existing domain"
              inputParameters:
                - name: domain_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the domain"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  open_tracking: "{{tools.open_tracking}}"
                  click_tracking: "{{tools.click_tracking}}"
            - name: delete-domain
              method: DELETE
              description: "Remove an existing domain"
              inputParameters:
                - name: domain_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the domain"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: verify-domain
              method: POST
              description: "Verify an existing domain"
              inputParameters:
                - name: domain_id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the domain"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: api-keys
          path: /api-keys
          description: "API key management"
          operations:
            - name: create-api-key
              method: POST
              description: "Create a new API key"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  permission: "{{tools.permission}}"
            - name: list-api-keys
              method: GET
              description: "Retrieve a list of API keys"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-api-key
              method: DELETE
              description: "Remove an existing API key"
              inputParameters:
                - name: api_key_id
                  in: path
                  type: string
                  required: true
                  description: "The API key ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: audiences
          path: /audiences
          description: "Audience and contact management"
          operations:
            - name: create-audience
              method: POST
              description: "Create a list of contacts (audience)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: list-audiences
              method: GET
              description: "Retrieve a list of audiences"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-audience
              method: GET
              description: "Retrieve a single audience"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-audience
              method: DELETE
              description: "Remove an existing audience"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: contacts
          path: /audiences/{audience_id}/contacts
          description: "Audience contact management"
          operations:
            - name: create-contact
              method: POST
              description: "Create a new contact in an audience"
              inputParameters:
                - name: audience_id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  first_name: "{{tools.first_name}}"
                  last_name: "{{tools.last_name}}"
            - name: list-contacts
              method: GET
              description: "Retrieve a list of contacts in an audience"
              inputParameters:
                - name: audience_id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-contact
              method: GET
              description: "Retrieve a single contact"
              inputParameters:
                - name: audience_id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-contact
              method: PATCH
              description: "Update a single contact"
              inputParameters:
                - name: audience_id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  unsubscribed: "{{tools.unsubscribed}}"
            - name: delete-contact
              method: DELETE
              description: "Remove an existing contact by ID"
              inputParameters:
                - name: audience_id
                  in: path
                  type: string
                  required: true
                  description: "The Audience ID"
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Contact ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: broadcasts
          path: /broadcasts
          description: "Broadcast email campaign management"
          operations:
            - name: create-broadcast
              method: POST
              description: "Create a broadcast email campaign"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  audience_id: "{{tools.audience_id}}"
                  from: "{{tools.from}}"
                  subject: "{{tools.subject}}"
            - name: list-broadcasts
              method: GET
              description: "Retrieve a list of broadcasts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-broadcast
              method: GET
              description: "Retrieve a single broadcast"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Broadcast ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-broadcast
              method: POST
              description: "Send or schedule a broadcast"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Broadcast ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  scheduled_at: "{{tools.scheduled_at}}"
            - name: delete-broadcast
              method: DELETE
              description: "Remove an existing broadcast in draft status"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The Broadcast ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: resend-rest
      resources:
        - path: /v1/emails
          name: emails
          description: "Email sending"
          operations:
            - method: POST
              name: send-email
              description: "Send an email"
              call: "resend.send-email"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/emails/{id}
          name: email
          description: "Single email"
          operations:
            - method: GET
              name: get-email
              description: "Get a single email"
              call: "resend.get-email"
              with:
                email_id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audiences
          name: audiences
          description: "Audiences"
          operations:
            - method: GET
              name: list-audiences
              description: "List all audiences"
              call: "resend.list-audiences"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/broadcasts
          name: broadcasts
          description: "Broadcasts"
          operations:
            - method: GET
              name: list-broadcasts
              description: "List all broadcasts"
              call: "resend.list-broadcasts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: resend-mcp
      transport: http
      tools:
        - name: send-email
          description: "Send a transactional email"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "resend.send-email"
          with:
            from: "tools.from"
            to: "tools.to"
            subject: "tools.subject"
            html: "tools.html"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-email
          description: "Get details for a sent email by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "resend.get-email"
          with:
            email_id: "tools.email_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audiences
          description: "List all email audiences"
          hints:
            readOnly: true
            openWorld: true
          call: "resend.list-audiences"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-broadcasts
          description: "List all email broadcasts"
          hints:
            readOnly: true
            openWorld: true
          call: "resend.list-broadcasts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-domains
          description: "List all configured sending domains"
          hints:
            readOnly: true
            openWorld: true
          call: "resend.list-domains"
          outputParameters:
            - type: object
              mapping: "$."
