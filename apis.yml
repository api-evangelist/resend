apis:
  - aid: resend:resend
    name: Resend API
    description: >-
      The Resend REST API provides endpoints for sending emails, managing
      domains, managing API keys, managing audiences and contacts, and sending
      broadcast campaigns. Authentication uses Bearer tokens. Rate limit is
      5 requests per second per team by default. Base URL is https://api.resend.com.
    humanURL: https://resend.com/
    baseURL: https://api.resend.com
    tags:
