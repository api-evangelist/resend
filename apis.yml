aid: resend
name: Resend
description: >-
  Resend is a developer-first email API platform that simplifies sending and
  managing transactional and marketing emails. It provides a clean REST API with
  bearer token authentication, supporting email sending, domain management,
  API key management, audience and contact management, and broadcast campaigns.
  Resend offers SDKs for Node.js, Python, Go, Ruby, PHP, Java, .NET, Rust,
  Elixir, and more, along with a React Email library and official MCP server.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Email
  - Developer Tools
  - Transactional Email
  - Marketing Email
url: >-
